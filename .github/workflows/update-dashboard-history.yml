name: Update Dashboard History

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-history:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Japanese update summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-pro-preview-03-25
        run: node .github/scripts/update-web-updates.mjs

      - name: Commit and push updates.json
        run: |
          git add project-manager/apps/web/app/data/updates.json
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update dashboard history [skip ci]"
          git push
