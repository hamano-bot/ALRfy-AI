name: CI project-manager web

on:
  push:
    branches:
      - main
    paths:
      - "project-manager/apps/web/**"
      - ".github/workflows/ci-project-manager-web.yml"
  pull_request:
    branches:
      - main
    paths:
      - "project-manager/apps/web/**"
      - ".github/workflows/ci-project-manager-web.yml"

permissions:
  contents: read

jobs:
  lint-and-build:
    # Bot の follow-up push（[skip ci]）では走らせず、履歴 workflow との二重実行を避ける
    if: github.event_name == 'pull_request' || github.event.head_commit == null || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-manager/apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: project-manager/apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
